name: 'Create reminder from comment'

permissions:
  issues: write
  pull-requests: write

on:
  issue_comment:
    types: [created, edited]

jobs:
  reminder:
    if: github.repository == 'roundcube/roundcubemail-docker'
    runs-on: ubuntu-latest

    steps:
      - name: 👀 check for reminder
