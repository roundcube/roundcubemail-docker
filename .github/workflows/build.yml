name: Build & Publish
permissions:
  contents: read
on:
  push:
    branches:
      - 'master'
    paths-ignore:
      - 'README.md'
      - 'examples/**'
      - 'development/**'
      - 'nightly/**'
    tags:
      - '1.7.*'
      - '1.6.*'
  schedule:
    # Rebuild images each monday early morning to ensure a fresh base OS.
    - cron: "23 2 * * 1"
  workflow_dispatch:
jobs:
  build-and-testvariants:
    name: Build image variants and run tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        variant: ['apache', 'fpm', 'fpm-alpine']
        version: ['1.7.1', '1.6.16']
        target: ['root', 'nonroot']
        include:
          - variant: apache
            version: '1.7.1'
            tag_as_latest_arg: "--tag-as-latest"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Docker
        # This step is required to enable the containerd image store, which is required by the cache type=gha
        uses: docker/setup-docker-action@efe9e3891a4f7307e689f2100b33a155b900a608 # v4.5.0
        with:
          daemon-config: |
           {
             "debug": true,
             "features": {
               "containerd-snapshotter": true
             }
           }
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0
        with:
          buildkitd-flags: --debug
      - name: Build and test "${{ matrix.version }}" "${{ matrix.variant }} "${{ matrix.target }}"
        run: |
          ./build-image.sh --variant "${{ matrix.variant }}" --version "${{ matrix.version }}" --target "${{ matrix.target }}" --run-tests
      # Only log into docker now, so we benefit from the automatic caching of upstream images. (Apparently we
      # can only benefit from cached upstream images if the job is not authenticated.)
      - name: Get docker hub username
        id: creds
        run: echo 'username=${{ secrets.DOCKER_PULL_USERNAME }}' >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        if: steps.creds.outputs.username != ''
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKER_PULL_USERNAME }}
          password: ${{ secrets.DOCKER_PUSH_PASSWORD }}
      - name: Build and push "${{ matrix.version }}" "${{ matrix.variant }} "${{ matrix.target }}"
        run: |
          ./build-image.sh --variant "${{ matrix.variant }}" --version "${{ matrix.version }}" --target "${{ matrix.target }}" ${{ matrix.tag_as_latest_arg }} --platforms "linux/arm64,linux/arm/v6,linux/arm/v7,linux/386,linux/amd64" --push
